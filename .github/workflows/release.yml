name: Auto release binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-version:
    name: Calculate next SemVer
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      release_version: ${{ steps.version.outputs.release_version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      bump_type: ${{ steps.version.outputs.bump_type }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          if [ -n "${latest_tag}" ]; then
            commit_log="$(git log --format='%s%n%b' "${latest_tag}..HEAD")"
          else
            commit_log="$(git log --format='%s%n%b')"
          fi

          if [ -z "${commit_log}" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "${commit_log}" | grep -Eiq '\[skip release\]'; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bump_type="patch"
          if echo "${commit_log}" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
            bump_type="major"
          elif echo "${commit_log}" | grep -Eq '^feat(\([^)]+\))?:'; then
            bump_type="minor"
          fi

          if [ -n "${latest_tag}" ]; then
            current_version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${current_version}"
          else
            major=0
            minor=0
            patch=0
          fi

          case "${bump_type}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          release_version="${major}.${minor}.${patch}"
          release_tag="v${release_version}"

          if git rev-parse "${release_tag}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${bump_type}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${latest_tag}" >> "$GITHUB_OUTPUT"

  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    needs: prepare-version
    if: needs.prepare-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Windows installers
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers-${{ needs.prepare-version.outputs.release_tag }}
          if-no-files-found: error
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: prepare-version
    if: needs.prepare-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install mobile dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Rename release APK
        run: cp mobile/build/app/outputs/flutter-apk/app-release.apk mobile/build/app/outputs/flutter-apk/micOwireless-mobile-${{ needs.prepare-version.outputs.release_tag }}.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.prepare-version.outputs.release_tag }}
          if-no-files-found: error
          path: mobile/build/app/outputs/flutter-apk/micOwireless-mobile-${{ needs.prepare-version.outputs.release_tag }}.apk

  publish-release:
    name: Create tag and publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare-version
      - build-windows
      - build-android
    if: needs.prepare-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ needs.prepare-version.outputs.release_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          fi
          git push origin "${RELEASE_TAG}"

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: windows-installers-${{ needs.prepare-version.outputs.release_tag }}
          path: release-assets/windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ needs.prepare-version.outputs.release_tag }}
          path: release-assets/mobile

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-version.outputs.release_tag }}
          name: ${{ needs.prepare-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/windows/*.msi
            release-assets/windows/*.exe
            release-assets/mobile/*.apk
